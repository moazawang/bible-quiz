<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✝️ 聖經金句學習卡</title>

  <style>
    /* =====================================================
       基本重置：清除瀏覽器預設的邊距與填充
       ===================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* =====================================================
       整體頁面背景：紫藍漸層，營造莊嚴感
       ===================================================== */
    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(150deg, #1a237e 0%, #4527a0 45%, #880e4f 100%);
      padding: 20px;
      padding-bottom: 50px;
    }

    /* =====================================================
       主卡片：白色圓角卡片，置中顯示
       ===================================================== */
    .main-card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 24px;
      padding: 38px 40px;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
    }

    /* =====================================================
       頁首標題區域
       ===================================================== */
    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-size: 2rem;
      color: #4527a0;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .page-header p {
      color: #999;
      font-size: 0.92rem;
    }

    /* =====================================================
       出題模式：各區塊間距
       ===================================================== */
    .form-section {
      margin-bottom: 26px;
    }

    /* 標籤（欄位名稱） */
    .form-label {
      display: block;
      font-weight: bold;
      color: #333;
      margin-bottom: 9px;
      font-size: 1rem;
    }
    /* 序號圓形徽章 */
    .form-label .label-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #4527a0;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.82rem;
      margin-right: 8px;
      font-weight: bold;
    }

    /* 通用輸入框樣式 */
    textarea.form-input,
    input[type="text"].form-input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      color: #333;
      background: #fafafa;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    textarea.form-input {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }
    textarea.form-input:focus,
    input[type="text"].form-input:focus {
      outline: none;
      border-color: #4527a0;
      box-shadow: 0 0 0 3px rgba(69, 39, 160, 0.15);
      background: #fff;
    }

    /* 補充說明小字 */
    .helper-text {
      font-size: 0.83rem;
      color: #999;
      margin-top: 5px;
      line-height: 1.5;
    }

    /* =====================================================
       選項數量：單選按鈕樣式
       ===================================================== */
    .radio-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 1rem;
      color: #444;
      padding: 9px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      transition: all 0.2s;
      user-select: none;
    }
    /* 選中時的樣式 */
    .radio-label.selected {
      border-color: #4527a0;
      background: #f3e5f5;
      color: #4527a0;
    }
    .radio-label input[type="radio"] {
      width: 17px;
      height: 17px;
      accent-color: #4527a0;
    }

    /* =====================================================
       選項輸入列（每一行包含：號碼 + 文字框 + 正確答案單選）
       ===================================================== */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .option-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 號碼徽章（彩色圓形） */
    .opt-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: #fff;
      font-weight: bold;
      font-size: 1.05rem;
      flex-shrink: 0;
    }
    .opt-badge-1 { background: #1565c0; }
    .opt-badge-2 { background: #2e7d32; }
    .opt-badge-3 { background: #e65100; }
    .opt-badge-4 { background: #ad1457; }

    /* 選項文字輸入框 */
    .option-row input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.25s;
    }
    .option-row input[type="text"]:focus {
      outline: none;
      border-color: #4527a0;
    }

    /* 「✓ 正確答案」的單選標籤 */
    .correct-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.88rem;
      color: #666;
      white-space: nowrap;
    }
    .correct-wrap input[type="radio"] {
      width: 17px;
      height: 17px;
      accent-color: #2e7d32;
    }

    /* =====================================================
       按鈕樣式
       ===================================================== */
    .btn-group {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .btn {
      padding: 12px 26px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: all 0.28s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn-purple {
      background: linear-gradient(135deg, #4527a0, #880e4f);
      color: #fff;
      box-shadow: 0 4px 16px rgba(69, 39, 160, 0.35);
    }
    .btn-purple:hover {
      box-shadow: 0 7px 22px rgba(69, 39, 160, 0.45);
    }
    .btn-green {
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      color: #fff;
      box-shadow: 0 4px 16px rgba(46, 125, 50, 0.35);
    }
    .btn-orange {
      background: linear-gradient(135deg, #e65100, #bf360c);
      color: #fff;
      box-shadow: 0 4px 16px rgba(230, 81, 0, 0.35);
    }

    /* =====================================================
       產生網址：結果顯示框
       ===================================================== */
    .url-box {
      display: none;           /* 預設隱藏，產生後才顯示 */
      margin-top: 22px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 14px;
      border: 1px solid #e0e0e0;
    }
    .url-box h3 {
      color: #333;
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .url-text-display {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.82rem;
      color: #555;
      word-break: break-all;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    #copyConfirm {
      display: none;
      color: #2e7d32;
      font-size: 0.9rem;
      margin-left: 14px;
    }

    /* =====================================================
       分隔線
       ===================================================== */
    .divider {
      border: none;
      border-top: 2px dashed #e8e8e8;
      margin: 28px 0;
    }

    /* =====================================================
       作答模式：題目區塊
       ===================================================== */
    #quiz-mode {
      display: none; /* 預設隱藏，由 JS 控制顯示 */
    }

    /* 金句顯示框 */
    .verse-box {
      background: linear-gradient(135deg, #e8eaf6, #f3e5f5);
      border-radius: 16px;
      padding: 26px 30px;
      margin-bottom: 20px;
      border-left: 5px solid #4527a0;
    }

    /* 金句文字（大字顯示給兒童閱讀） */
    .verse-text {
      font-size: 1.75rem;
      font-weight: bold;
      color: #1a237e;
      line-height: 2;
      text-align: center;
    }

    /* 挖空的關鍵字：顯示為有虛線框的方框 */
    .verse-blank {
      display: inline-block;
      background: #fff;
      border: 2px dashed #4527a0;
      border-radius: 8px;
      padding: 2px 14px;
      margin: 0 3px;
      color: #4527a0;           /* 顯示底線字元，顏色與主題一致 */
      letter-spacing: 4px;
      font-weight: bold;
    }

    /* 出處欄位（字體比金句小） */
    .verse-source {
      margin-top: 14px;
      text-align: right;
      font-size: 0.98rem;       /* 比金句 1.75rem 小很多 */
      color: #7e6ea0;
      font-style: italic;
    }

    /* 作答說明文字 */
    .quiz-hint {
      text-align: center;
      color: #666;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    /* =====================================================
       作答選項按鈕格子（2×2 排列）
       ===================================================== */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }
    /* 只有3個選項時改為單欄 */
    .options-grid.single-col {
      grid-template-columns: 1fr;
    }

    /* 每個選項按鈕 */
    .opt-btn {
      padding: 17px 18px;
      border: 3px solid #e0e0e0;
      border-radius: 14px;
      font-size: 1.22rem;
      cursor: pointer;
      font-family: inherit;
      background: #fff;
      text-align: left;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 13px;
      color: #333;
    }
    .opt-btn:hover:not([disabled]) {
      border-color: #9575cd;
      background: #f3e5f5;
      transform: translateY(-3px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    }
    .opt-btn:disabled {
      cursor: default;
    }

    /* 號碼圓形（彩色） */
    .opt-circle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50%;
      font-weight: bold;
      font-size: 1.1rem;
      color: #fff;
    }

    /* 答對：綠色邊框 + 動畫 */
    .opt-btn.correct {
      border-color: #2e7d32 !important;
      background: #e8f5e9 !important;
      animation: pulseCorrect 0.5s ease;
    }
    /* 答錯：紅色邊框 + 搖晃動畫 */
    .opt-btn.wrong {
      border-color: #c62828 !important;
      background: #ffebee !important;
      animation: shakeWrong 0.5s ease;
    }

    @keyframes pulseCorrect {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes shakeWrong {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-9px); }
      40%       { transform: translateX(9px); }
      60%       { transform: translateX(-9px); }
      80%       { transform: translateX(9px); }
    }

    /* =====================================================
       回饋訊息區域（答對/答錯後顯示）
       ===================================================== */
    .feedback-area {
      text-align: center;
      min-height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .feedback-emoji {
      font-size: 2.8rem;
      line-height: 1;
    }
    .feedback-msg {
      font-size: 1.3rem;
      font-weight: bold;
    }
    .feedback-msg.ok  { color: #2e7d32; }
    .feedback-msg.bad { color: #c62828; }

    /* 「再試一次」按鈕（答題後出現） */
    .try-again-btn {
      display: none;
      margin: 18px auto 0;
      padding: 12px 38px;
      background: linear-gradient(135deg, #ff6f00, #e65100);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      box-shadow: 0 4px 16px rgba(255,111,0,0.4);
      transition: all 0.28s;
    }
    .try-again-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 22px rgba(255,111,0,0.5);
    }

    /* 返回出題模式連結 */
    .back-link {
      text-align: center;
      margin-top: 22px;
    }
    .back-link a {
      color: #bbb;
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link a:hover { color: #4527a0; }

    /* =====================================================
       彩帶動畫容器（覆蓋整個畫面）
       ===================================================== */
    #confetti-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* 不擋住點擊 */
      z-index: 9999;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 3px;
    }
    @keyframes cffall {
      0%   { top: -20px; opacity: 1; transform: rotate(0deg) translateX(0); }
      100% { top: 110vh;  opacity: 0; transform: rotate(720deg) translateX(40px); }
    }

    /* =====================================================
       響應式設計（手機版）
       ===================================================== */
    @media (max-width: 620px) {
      .main-card  { padding: 22px 18px; }
      .page-header h1 { font-size: 1.55rem; }
      .verse-text { font-size: 1.38rem; }
      .options-grid { grid-template-columns: 1fr; } /* 手機版一欄 */
      .btn-group  { flex-direction: column; }
      .btn        { width: 100%; justify-content: center; }
    }
  </style>
</head>

<body>
  <!-- 主白色卡片 -->
  <div class="main-card">

    <!-- ── 頁首標題 ── -->
    <div class="page-header">
      <h1>✝️ 聖經金句學習卡</h1>
      <p>互動式兒童主日學聖經填空練習</p>
    </div>

    <!-- =========================================================
         出題模式（預設顯示；作答時由 JS 隱藏）
         ========================================================= -->
    <div id="creator-mode">

      <!-- 1. 聖經金句 -->
      <div class="form-section">
        <label class="form-label">
          <span class="label-num">1</span>聖經金句
        </label>
        <textarea
          id="verseInput"
          class="form-input"
          placeholder='請貼入完整聖經金句，例如：「你手所當做的事要盡力去做。」'
        ></textarea>
      </div>

      <!-- 2. 出處（書卷章節） -->
      <div class="form-section">
        <label class="form-label">
          <span class="label-num">2</span>出處（書卷章節）
        </label>
        <input
          type="text"
          id="sourceInput"
          class="form-input"
          placeholder="例如：傳道書 9:10"
        />
        <p class="helper-text">此欄位在題目中字體較金句小，讓學生知道經文出處。</p>
      </div>

      <!-- 3. 挖空的關鍵字 -->
      <div class="form-section">
        <label class="form-label">
          <span class="label-num">3</span>要挖空的關鍵字
        </label>
        <input
          type="text"
          id="blankWord"
          class="form-input"
          placeholder="請輸入要挖掉的詞語（須與金句中的文字完全相同）"
        />
        <p class="helper-text">⚠️ 此關鍵字必須出現在上方金句中，且文字完全一致。</p>
      </div>

      <!-- 4. 選項數量 -->
      <div class="form-section">
        <label class="form-label">
          <span class="label-num">4</span>選項數量
        </label>
        <div class="radio-group" id="optCountGroup">
          <label class="radio-label" id="lbl3">
            <input type="radio" name="optCount" value="3" /> 3 個選項（三選一）
          </label>
          <label class="radio-label selected" id="lbl4">
            <input type="radio" name="optCount" value="4" checked /> 4 個選項（四選一）
          </label>
        </div>
      </div>

      <!-- 5. 選項內容 -->
      <div class="form-section">
        <label class="form-label">
          <span class="label-num">5</span>選項內容
          <span style="font-weight:normal; font-size:0.88rem; color:#aaa;">（勾選 ✓ 標示正確答案）</span>
        </label>
        <div class="options-list">

          <!-- 選項 1 -->
          <div class="option-row">
            <div class="opt-badge opt-badge-1">1</div>
            <input type="text" id="t1" placeholder="選項 1 的文字" />
            <label class="correct-wrap">
              <input type="radio" name="correctAns" value="0" /> ✓ 正確
            </label>
          </div>

          <!-- 選項 2 -->
          <div class="option-row">
            <div class="opt-badge opt-badge-2">2</div>
            <input type="text" id="t2" placeholder="選項 2 的文字" />
            <label class="correct-wrap">
              <input type="radio" name="correctAns" value="1" /> ✓ 正確
            </label>
          </div>

          <!-- 選項 3 -->
          <div class="option-row">
            <div class="opt-badge opt-badge-3">3</div>
            <input type="text" id="t3" placeholder="選項 3 的文字" />
            <label class="correct-wrap">
              <input type="radio" name="correctAns" value="2" /> ✓ 正確
            </label>
          </div>

          <!-- 選項 4（只在「四選一」時顯示） -->
          <div class="option-row" id="row4">
            <div class="opt-badge opt-badge-4">4</div>
            <input type="text" id="t4" placeholder="選項 4 的文字" />
            <label class="correct-wrap">
              <input type="radio" name="correctAns" value="3" /> ✓ 正確
            </label>
          </div>

        </div>
      </div>

      <!-- 操作按鈕 -->
      <div class="btn-group">
        <button class="btn btn-purple" onclick="previewQuiz()">🔍 預覽題目</button>
        <button class="btn btn-green"  onclick="generateUrl()">🔗 產生專屬網址</button>
      </div>

      <!-- 網址產生結果（點按鈕後出現） -->
      <div class="url-box" id="urlBox">
        <h3>📎 專屬網址已產生！</h3>
        <p style="font-size:0.85rem; color:#888; margin-bottom:10px;">
          複製以下連結，分享給小朋友即可開始作答：
        </p>
        <div class="url-text-display" id="urlDisplay"></div>
        <div style="display:flex; align-items:center; flex-wrap:wrap; gap:10px;">
          <button class="btn btn-orange" onclick="copyUrl()">📋 複製網址</button>
          <span id="copyConfirm">✅ 已複製到剪貼簿！</span>
        </div>
      </div>

    </div><!-- /creator-mode -->

    <!-- =========================================================
         作答模式（由 JS 顯示）
         ========================================================= -->
    <div id="quiz-mode">

      <!-- 金句題目框 -->
      <div class="verse-box">
        <!-- 金句內容（大字，含挖空框） -->
        <div class="verse-text" id="qVerse"></div>
        <!-- 出處（小字，斜體） -->
        <div class="verse-source" id="qSource"></div>
      </div>

      <!-- 作答提示 -->
      <p class="quiz-hint">👆 請選出填入空格的正確答案：</p>

      <!-- 選項按鈕格 -->
      <div class="options-grid" id="optGrid"></div>

      <!-- 回饋區域 -->
      <div class="feedback-area" id="feedback"></div>

      <!-- 「再試一次」按鈕 -->
      <div style="text-align:center;">
        <button class="try-again-btn" id="tryAgainBtn" onclick="resetQuiz()">
          🔄 再試一次
        </button>
      </div>

      <!-- 返回出題模式 -->
      <div class="back-link">
        <a href="javascript:void(0)" onclick="goToCreator()">⚙️ 返回出題設定</a>
      </div>

    </div><!-- /quiz-mode -->

  </div><!-- /main-card -->

  <!-- 彩帶動畫容器（固定在最上層） -->
  <div id="confetti-wrap"></div>

  <!-- ============================================================
       JavaScript：所有功能邏輯
       ============================================================ -->
  <script>
    // ── 全域變數 ────────────────────────────────────────────────
    let currentData = null;       // 目前的題目資料（物件）
    let shuffled    = [];         // 打亂後的選項陣列
    let answered    = false;      // 這一題是否已作答
    let cfInterval  = null;       // 彩帶計時器
    let audioCtx    = null;       // Web Audio Context（音效引擎）

    // 每個號碼對應的顏色
    const OPT_COLORS = ['#1565c0', '#2e7d32', '#e65100', '#ad1457'];

    // ── 頁面初始化 ───────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', function () {

      // 檢查 URL 是否帶有題目參數 ?q=...
      const params = new URLSearchParams(window.location.search);
      const qParam = params.get('q');

      if (qParam) {
        // 有參數 → 進入「作答模式」
        try {
          currentData = decodeData(qParam);
          enterQuizMode(currentData);
        } catch (e) {
          alert('⚠️ 題目資料無效，請重新產生網址。');
          enterCreatorMode();
        }
      } else {
        // 無參數 → 進入「出題模式」
        enterCreatorMode();
      }

      // 監聽「選項數量」切換，控制第 4 個選項的顯示
      document.querySelectorAll('input[name="optCount"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
          const is4 = this.value === '4';
          document.getElementById('row4').style.display = is4 ? 'flex' : 'none';
          // 更新標籤選中樣式
          document.getElementById('lbl3').classList.toggle('selected', !is4);
          document.getElementById('lbl4').classList.toggle('selected',  is4);
          // 若切換到 3 選項，清除可能選到第 4 個的正確答案
          if (!is4) {
            const r4 = document.querySelector('input[name="correctAns"][value="3"]');
            if (r4 && r4.checked) r4.checked = false;
          }
        });
      });
    });

    // ── 模式切換 ─────────────────────────────────────────────────

    function enterCreatorMode() {
      document.getElementById('creator-mode').style.display = 'block';
      document.getElementById('quiz-mode').style.display   = 'none';
    }

    function enterQuizMode(data) {
      document.getElementById('creator-mode').style.display = 'none';
      document.getElementById('quiz-mode').style.display   = 'block';
      renderQuiz(data);
    }

    // 返回出題模式（移除 URL 參數）
    function goToCreator() {
      stopConfetti();
      window.history.pushState({}, '', window.location.pathname);
      enterCreatorMode();
    }

    // ── 出題模式：收集表單資料並驗證 ────────────────────────────

    function collectForm() {
      // 取得各欄位的值，並去除首尾空白
      const verse  = document.getElementById('verseInput').value.trim();
      const source = document.getElementById('sourceInput').value.trim();
      const blank  = document.getElementById('blankWord').value.trim();

      // 判斷選項數量（預設 4）
      const countEl = document.querySelector('input[name="optCount"]:checked');
      const count   = countEl ? parseInt(countEl.value) : 4;

      // 讀取各選項文字
      const optTexts = [
        document.getElementById('t1').value.trim(),
        document.getElementById('t2').value.trim(),
        document.getElementById('t3').value.trim(),
      ];
      if (count === 4) {
        optTexts.push(document.getElementById('t4').value.trim());
      }

      // 讀取正確答案的索引
      const correctEl = document.querySelector('input[name="correctAns"]:checked');

      // ── 驗證 ──
      if (!verse) { alert('⚠️ 請填寫聖經金句！'); return null; }
      if (!blank) { alert('⚠️ 請填寫要挖空的關鍵字！'); return null; }
      if (!verse.includes(blank)) {
        alert(`⚠️ 在金句中找不到「${blank}」\n請確認與金句中的文字完全一樣（包括標點）。`);
        return null;
      }
      for (let i = 0; i < optTexts.length; i++) {
        if (!optTexts[i]) { alert(`⚠️ 請填寫選項 ${i + 1} 的文字！`); return null; }
      }
      if (!correctEl) { alert('⚠️ 請點選哪個是正確答案！'); return null; }
      const correctIdx = parseInt(correctEl.value);
      if (correctIdx >= count) { alert('⚠️ 正確答案超出範圍，請重新選擇。'); return null; }

      // 回傳整理好的題目資料物件
      return {
        verse:   verse,        // 完整金句文字
        blank:   blank,        // 要挖空的詞
        source:  source,       // 出處（可留空）
        options: optTexts,     // 所有選項文字
        correct: correctIdx    // 正確選項的索引（從 0 開始）
      };
    }

    // 預覽題目按鈕
    function previewQuiz() {
      const data = collectForm();
      if (!data) return;
      currentData = data;
      enterQuizMode(data);
    }

    // 產生專屬網址按鈕
    function generateUrl() {
      const data = collectForm();
      if (!data) return;

      // 把題目資料編碼成 Base64 字串
      const encoded = encodeData(data);
      const url = window.location.origin + window.location.pathname + '?q=' + encoded;

      // 顯示網址框
      document.getElementById('urlDisplay').textContent = url;
      const box = document.getElementById('urlBox');
      box.style.display = 'block';
      box.scrollIntoView({ behavior: 'smooth' });
    }

    // 複製網址到剪貼簿
    function copyUrl() {
      const url = document.getElementById('urlDisplay').textContent;
      const confirm = document.getElementById('copyConfirm');

      // 使用現代 Clipboard API，若失敗則退回舊方法
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function () {
          confirm.style.display = 'inline';
          setTimeout(function () { confirm.style.display = 'none'; }, 3000);
        });
      } else {
        // 舊瀏覽器備用方法
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        confirm.style.display = 'inline';
        setTimeout(function () { confirm.style.display = 'none'; }, 3000);
      }
    }

    // ── 作答模式：渲染題目 ──────────────────────────────────────

    function renderQuiz(data) {
      answered = false;

      // 1. 顯示金句（把關鍵字換成空格框）
      document.getElementById('qVerse').innerHTML = buildVerseHtml(data.verse, data.blank);

      // 2. 顯示出處（小字）
      document.getElementById('qSource').textContent =
        data.source ? '── ' + data.source + ' ──' : '';

      // 3. 打亂選項順序（每次重新作答都隨機排列）
      shuffled = shuffleOptions(data.options, data.correct);

      // 4. 渲染選項按鈕
      buildOptionButtons(shuffled, data.options.length);

      // 5. 清空回饋訊息，隱藏「再試一次」
      document.getElementById('feedback').innerHTML   = '';
      document.getElementById('tryAgainBtn').style.display = 'none';
    }

    // 把金句中的關鍵字替換成帶樣式的空格方框
    function buildVerseHtml(verse, blank) {
      // 先把文字做 HTML 轉義（防止任意 HTML 注入）
      const safeVerse = escapeHtml(verse);
      const safeBlank = escapeHtml(blank);

      // 用底線字元顯示挖空框（依關鍵字長度決定寬度）
      const blankContent = '＿'.repeat(Math.max(2, blank.length));
      const blankHtml = `<span class="verse-blank">${blankContent}</span>`;

      // 只替換第一個出現的關鍵字
      return safeVerse.replace(safeBlank, blankHtml);
    }

    // 渲染選項按鈕（動態產生）
    function buildOptionButtons(opts, totalCount) {
      const grid = document.getElementById('optGrid');
      grid.innerHTML = ''; // 清除舊內容

      // 超過 2 個選項才用雙欄；手機版 CSS 會覆蓋為單欄
      grid.className = 'options-grid' + (totalCount === 3 ? ' single-col' : '');

      opts.forEach(function (opt, i) {
        const btn = document.createElement('button');
        btn.className  = 'opt-btn';
        btn.id         = 'ob' + i;
        btn.innerHTML  =
          `<span class="opt-circle" style="background:${OPT_COLORS[i]}">${i + 1}</span>` +
          `<span>${escapeHtml(opt.text)}</span>`;

        // 點擊時處理答題
        btn.addEventListener('click', function () {
          if (answered) return; // 已答過就不理
          handleAnswer(i, opt.isCorrect);
        });

        grid.appendChild(btn);
      });
    }

    // 打亂選項順序（Fisher-Yates 洗牌），同時追蹤哪個是正確答案
    function shuffleOptions(options, correctIdx) {
      // 把每個選項包成物件，帶上 isCorrect 標記
      const items = options.map(function (text, i) {
        return { text: text, isCorrect: i === correctIdx };
      });

      // Fisher-Yates 洗牌：從最後一個開始，隨機與前面的元素交換
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = items[i]; items[i] = items[j]; items[j] = tmp;
      }
      return items;
    }

    // ── 處理作答 ────────────────────────────────────────────────

    function handleAnswer(selectedIdx, isCorrect) {
      if (answered) return;
      answered = true;

      // 禁用所有選項按鈕，不讓再點
      document.querySelectorAll('.opt-btn').forEach(function (b) {
        b.disabled = true;
      });

      if (isCorrect) {
        // 答對 ✅
        document.getElementById('ob' + selectedIdx).classList.add('correct');
        showFeedback(true);
        playCorrectSound();
        launchConfetti();
      } else {
        // 答錯 ❌
        document.getElementById('ob' + selectedIdx).classList.add('wrong');
        // 同時把正確答案標為綠色，讓學生知道正確選項
        shuffled.forEach(function (opt, i) {
          if (opt.isCorrect) {
            document.getElementById('ob' + i).classList.add('correct');
          }
        });
        showFeedback(false);
        playWrongSound();
      }

      // 顯示「再試一次」按鈕
      document.getElementById('tryAgainBtn').style.display = 'inline-block';
    }

    // 顯示回饋訊息（答對/答錯）
    function showFeedback(isCorrect) {
      document.getElementById('feedback').innerHTML = isCorrect
        ? '<div class="feedback-emoji">🎉</div><div class="feedback-msg ok">答對了！太棒了！</div>'
        : '<div class="feedback-emoji">😅</div><div class="feedback-msg bad">答錯了，繼續加油！</div>';
    }

    // 「再試一次」：重新渲染題目（選項會重新打亂）
    function resetQuiz() {
      stopConfetti();
      if (currentData) renderQuiz(currentData);
    }

    // ── 音效（Web Audio API）────────────────────────────────────
    // Web Audio API 是瀏覽器內建的音效引擎，不需要外部音檔

    // 取得（或初始化）音效引擎
    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    // 播放一個音符（freq=頻率Hz, start=開始時間, dur=持續秒, vol=音量）
    function playTone(freq, start, dur, type, vol) {
      const ctx  = getAudioCtx();
      const osc  = ctx.createOscillator(); // 振盪器：產生音調
      const gain = ctx.createGain();       // 音量節點

      osc.connect(gain);
      gain.connect(ctx.destination); // 連接到喇叭輸出

      osc.type            = type || 'sine'; // 波形（sine=純音、sawtooth=鋸齒=刺耳）
      osc.frequency.value = freq;

      // 淡入淡出（避免爆音）
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(vol || 0.35, start + 0.025);
      gain.gain.exponentialRampToValueAtTime(0.001, start + dur);

      osc.start(start);
      osc.stop(start + dur + 0.01);
    }

    // 答對音效：C-E-G-C 上升大和弦琶音，聽起來歡樂
    function playCorrectSound() {
      const ctx  = getAudioCtx();
      const now  = ctx.currentTime;
      [523.25, 659.25, 783.99, 1046.50].forEach(function (freq, i) {
        playTone(freq, now + i * 0.13, 0.3, 'sine', 0.32);
      });
    }

    // 答錯音效：低沉下滑的鋸齒波，聽起來「嗚嗚」
    function playWrongSound() {
      const ctx  = getAudioCtx();
      const now  = ctx.currentTime;
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(280, now);
      osc.frequency.linearRampToValueAtTime(100, now + 0.5); // 音調從高降低

      gain.gain.setValueAtTime(0.32, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);

      osc.start(now);
      osc.stop(now + 0.6);
    }

    // ── 彩帶動畫 ────────────────────────────────────────────────

    const CF_COLORS = [
      '#f44336','#e91e63','#9c27b0','#3f51b5',
      '#2196f3','#00bcd4','#4caf50','#ffeb3b','#ff9800'
    ];

    function launchConfetti() {
      const wrap = document.getElementById('confetti-wrap');
      wrap.innerHTML = ''; // 清除舊彩帶

      let count = 0;
      const MAX = 90; // 總共產生幾片彩帶

      cfInterval = setInterval(function () {
        if (count >= MAX) { stopConfetti(); return; }

        const el  = document.createElement('div');
        el.className = 'confetti-piece';

        const x    = Math.random() * 100;               // 水平位置 (vw %)
        const dur  = (2 + Math.random() * 3).toFixed(1); // 飛落時間
        const del  = (Math.random() * 0.6).toFixed(2);   // 延遲
        const size = (9 + Math.random() * 11).toFixed(0);// 大小
        const col  = CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)];
        const rot  = Math.floor(Math.random() * 360);    // 初始旋轉角度
        const rnd  = Math.random() > 0.5;                // 隨機形狀

        el.style.cssText =
          `left:${x}%; width:${size}px; height:${size}px;` +
          `background:${col}; border-radius:${rnd ? '50%' : '3px'};` +
          `animation:cffall ${dur}s ${del}s linear forwards;` +
          `transform:rotate(${rot}deg);`;

        wrap.appendChild(el);
        count++;
      }, 30); // 每 30ms 產生一片
    }

    // 停止彩帶（3 秒後清空）
    function stopConfetti() {
      if (cfInterval) { clearInterval(cfInterval); cfInterval = null; }
      setTimeout(function () {
        document.getElementById('confetti-wrap').innerHTML = '';
      }, 3000);
    }

    // ── 資料編碼 / 解碼（支援中文字元）────────────────────────
    // btoa() 只支援 ASCII，需要先用 encodeURIComponent 處理中文

    // 將題目物件 → JSON → URL 安全的 Base64
    // 說明：標準 Base64 含有 +、/、= 三個字元，放進 URL 會被誤解析：
    //   + 在 URL 中代表空格，/ 是路徑分隔符，= 是參數賦值符
    // 解法：改用「URL 安全 Base64」—— 把 + 換成 -，/ 換成 _，移除 =
    function encodeData(obj) {
      const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
      return b64.replace(/\+/g, '-')   // + → -（URL 安全）
                .replace(/\//g, '_')   // / → _（URL 安全）
                .replace(/=/g,  '');   // 移除填充的 = 號
    }

    // 將 URL 安全 Base64 → 標準 Base64 → JSON → 題目物件
    function decodeData(b64) {
      // 第一步：把 URL 安全字元還原成標準 Base64 字元
      let standard = b64.replace(/-/g, '+').replace(/_/g, '/');
      // 第二步：補回被移除的 = 填充（Base64 長度必須是 4 的倍數）
      while (standard.length % 4 !== 0) standard += '=';
      // 第三步：解碼回 JSON 字串並轉成物件
      return JSON.parse(decodeURIComponent(escape(atob(standard))));
    }

    // ── 工具函式 ─────────────────────────────────────────────────

    // HTML 轉義（防止使用者輸入的文字變成 HTML 標籤）
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }
  </script>
</body>
